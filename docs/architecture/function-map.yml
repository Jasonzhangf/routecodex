      - "Responses handler must not locally read/strip request-body `metadata` or introspect `clientAbortSignal`; request-body preprocessing and abort-signal extraction must stay behind the single request bridge surface."
      - "Protocol truth is write-once at request entry and VR selection; handler/bridge code must only read MetadataCenter truth and must not infer `providerProtocol` / `clientProtocol` from payload shape or endpoint fallbacks."
      - "Current repo truth: request-executor request-route owner writes `runtime_control.providerProtocol`; Rust mainline readers with `metadataCenterSnapshot` must prefer `runtimeControl.providerProtocol`, while top-level `providerProtocol` remains a transitional transport shell where no center input is available yet."

