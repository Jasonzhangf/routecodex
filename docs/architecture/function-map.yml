    notes:
      - "This row now owns the registry core and release edge only; request capture, attempt merge, and servertool adapter projection moved to file-scoped sub-features for queryability."
      - "The same request-scoped `MetadataCenter` must flow from server inbound through Hub Pipeline and provider/runtime into response closeout; stage-local plain-object mirrors may exist only as thin projections around the same bound center, never as a second truth source."
      - "MetadataCenter is a control-side carrier only. It must not store copied request payloads, request context objects, normalized input snapshots, or any other request/response data mirrors."
      - "The machine-readable metadata-center manifest must stay code-bound: every declared family/slot needs matching TS type, state bucket, writer, reader, and release coverage until the owner migrates to Rust."
      - "Closeout release is now a real handler owner path: response closeout must call `releaseMetadataCenterForHttpResponse -> MetadataCenter.markReleased`, not stay as documentation-only pending state."
      - "First-batch `runtime_control` carrier plumbing now lives in the registry core plus host-side projection reader; stopless followup materialization writes `runtime_control.stopless` through the bound MetadataCenter side-channel with fail-fast binding checks, while broader request-attempt / entry-shell writer migration remains partial."
      - "Retired zero-production-import servertool MetadataCenter carrier shell must stay deleted; servertool-local direct MetadataCenter write facades are no longer an allowed migration endpoint."
