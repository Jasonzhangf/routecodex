      - "Response-side continuation save is positioned after `HubRespChatProcess03Governed` and before `HubRespOutbound04ClientSemantic`."
      - "Req/Resp inbound and outbound are normalization/projection-only nodes; all continuation, tool governance, and semantic recovery must happen in Chat Process before save/restore."
