      - src/server/handlers
      - src/providers/profile
    required_tests:
      - tests/server/runtime/http-server/direct-passthrough-payload.spec.ts
      - tests/server/runtime/http-server/direct-passthrough-minimum-overrides.spec.ts
      - tests/server/runtime/http-server/direct-passthrough-route-level.spec.ts
      - tests/providers/core/runtime/protocol-http-providers.unit.test.ts
      - tests/providers/runtime/responses-provider.direct-passthrough.spec.ts
    required_gates:
      - npm run verify:responses-direct-tool-shape-contract
      - npm run verify:responses-direct-tool-shape-rust-first
      - npm run verify:responses-direct-tool-shape-native-availability
      - npm run verify:responses-direct-tool-shape-no-ts-fallback
      - npm run test:ci:jest
    migration_target: rust
    notes:
      - Rust validator is the only contract truth; TS is now transport/bridge shell only.
      - Direct provider passthrough body build (`strip __*`, metadata fail-fast, trimmed model required) must stay in Rust, not in provider TS runtime.
      - Direct route eligibility / relay-required decision (`providerWireValid` + `requiresHubRelay`) must stay in Rust, not split across `index.ts` and local helper branches.
      - same-protocol direct `apply_patch` declaration detection for servertool-mode relay must stay in Rust, not in `http-server/index.ts`.
      - `direct-passthrough-payload.ts` should expose one Rust-backed decision surface; avoid parallel TS helper exports for contract-vs-relay split.
      - Direct routeParams model/reasoning override must use the same Rust owner as provider direct, not duplicate TS mutation logic.
      - Direct raw `__raw_request_body` replay and stream flag lift must use the same Rust owner instead of local TS selection logic.

