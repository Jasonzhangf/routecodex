    required_gates:
      - npm run verify:architecture-ci
      - npm run verify:llmswitch-rustification-audit
    migration_target: rust
    notes:
      - non-empty routing invariant belongs to Rust Virtual Router selection only.
      - do not patch empty-pool behavior in handlers, executors, adapters, or provider TS runtime.
      - route order is high-priority pools -> low-priority pools -> default pool; if default pool has providers, routing must not return empty.

