      - Provider traffic saturation records provider_traffic_saturated, waits once through this queue, then raises saturation if still full so Virtual Router can switch provider even in priority mode.
      - Do not restore per-call/env backoff constants, softWaitTimeoutMs, exponential wait loops, or local waiter queues outside this owner.

