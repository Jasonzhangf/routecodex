      - "Continuation is a `/v1/responses` save/restore boundary only. It must not own response governance, request governance, history conversion, stopless/schema judgment, tool governance, SSE transport, or provider/client projection."
      - "After response Chat Process saves canonical continuation truth and before the next request Chat Process restores it, no layer may mutate request/response history: no cleanup, conversion, reordering, shape patching, semantic repair, or lossy normalization."
      - "All response/request content-changing logic must happen before continuation save in response Chat Process or after continuation restore in request Chat Process."
      - "Continuation store save/restore may persist and return canonical truth, but must not rewrite it to compensate for downstream shape expectations."
      - "Control semantics required across the boundary must be carried in MetadataCenter; payload/history are data-plane truth and must not receive route/provider/protocol/control pins."
      - "Response save must use the current active provider request label passed to `publishResponsesRecordPlanJson` before any stale `requestTruth.requestId`; provider request-id rebind must not record under the old router id."
      - "Handler response-store integration tests are not continuation owner gates. Stale tests that expect `sendPipelineResponse` or SSE transport to save continuation must be migrated to bridge/Rust owner tests or deleted, not greened by adding handler-side save logic."

