version: 1
description: >
  Budget lock for mainline call-map debt. Existing partial/binding-pending edges
  are explicitly acknowledged per chain, but any growth must fail fast until the
  chain is re-budgeted with review.
chains:
  - chain_id: config.user_config_materialization.mainline
    expected_total_edges: 10
    min_anchored_edges: 10
    max_partial_edges: 0
    max_binding_pending_edges: 0
    note: >
      Config materialization is fully anchored: TS public shell calls the native
      Rust loader, Rust owns TOML/provider/runtime manifest materialization, and
      server runtime consumes only the Rust-produced VR/Hub runtime artifacts.
  - chain_id: webui.config_editor_surface.mainline
    expected_total_edges: 2
