      WebUI config editor is a thin surface: user intent and admin API config
      mutation edges must stay anchored to WebUI/apiFetch and shared config
      writer owners; WebUI must not own provider runtime or forwarder selection.
  - chain_id: servertool.hook_skeleton.mainline
    expected_total_edges: 11
