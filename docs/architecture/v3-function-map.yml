      - v3.config.authoring_parsed
      - v3.config.schema_validated
      - v3.config.resource_registry
      - v3.config.published_manifest
      - v3.config.hub_pipeline_declarations
      - v3.config.route_pool_match_declarations
      - v3.server.listener_set
      - v3.server.validated_http_input
      - v3.error.chain
    entry_symbols:
      - compile_hub_v1
      - compile_server_execution
      - compile_pool_match
      - compile_provider_health
      - spawn_v3_server_aggregate
      - read_json_payload
      - project_v3_http_boundary_error
    allowed_paths:
