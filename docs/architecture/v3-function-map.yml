      - "Provider-facing guidance is a complete non-persistent current-turn guideline, not a terse `继续。`: Req04 must be transparent to the model by not mentioning no-op/CLI/client bridge/finish_reason/counters/budget/guard; it should continue from restored context, use tools when needed, require evidence before complete/blocked `reasoningStop`, and vary wording by StoplessCenter next_request_policy without exposing internal state."
      - "The internal `reasoningStop` tool-call arguments are the only model-originated stop state. Assistant visible text, fenced JSON, `<rcc_stop_schema>`, `next_step`, schemaFeedback, repeatCount/maxRepeats/triggerHint, and CLI stdout JSON are not StoplessCenter state sources."
      - "Natural `finish_reason=stop` without a reasoningStop state update updates StoplessCenter phase/consecutive_stop_count/need_continue policy; before the guard it projects a no-input no-op `routecodex hook run reasoningStop` client command, and at the guard it stops intercepting so the current provider `finish_reason=stop` response passes through without another CLI or synthesized internal-state diagnostic."
      - "The no-op CLI command has no args, no JSON envelope, no scope, and no state. Req04 consumes the current stopless call/output as current-turn evidence but never parses CLI stdout/args as StoplessCenter state."
      - "StoplessCenter side-channel state is stored only in MetadataCenter/runtime_control equivalent V3 relay control state, bound by entry endpoint + session + conversation + port + routing group. `V3ResponsesRelayStoplessControlState` is an adapter runtime handle under `StoplessCenterMetadataControl`, not the semantic owner. Local continuation context/store must never carry stopless control fields."
      - "Data/control lock: client/provider normal payload carries user/model data only; StoplessCenter is control_signal. CLI-carried scope/state, empty CLI JSON envelopes, normal payload state, continuation context state, debug/snapshot truth restore, and undeclared cross-SOP access are forbidden."
      - "Central aggregation may call StoplessCenter only through the declared v3.servertool_hook_skeleton_lifecycle SOP nodes. Generic Hub closeout, server entry/output aggregate edges, direct/provider-direct, provider runtime, SSE, debug, and continuation stores cannot claim StoplessCenter read/write ownership."
      - "Tool injection preserves the original declaration surface: top-level `tools` stays top-level, Responses `input[].type=additional_tools.tools` stays embedded, and stopless only appends exactly one internal `reasoningStop` declaration."
      - "Direct/provider-direct remains exactly-zero relay stopless: no schema/tool injection, no no-op CLI projection, and no relay stopless response hook activation."
      - "Stopless lifecycle docs are generated from `docs/architecture/manifests/v3.servertool_hook_skeleton_lifecycle.mainline.yml`; `docs/architecture/wiki/stopless-session-mainline-source.md` and `docs/architecture/wiki/html/stopless-session-mainline-source.html` must contain both the hook edge flowchart and StoplessCenter state transition diagram."
    runtime_status: controlled_runtime_slice_only

