lifecycle_id: metadata.center.mainline
summary: request-scoped metadata center for request truth, continuation context, runtime control, provider observation, response observation, closeout status, and debug/replay provenance
owner_feature_id: hub.metadata_center_mainline
entrypoint:
  node_id: MetaReq01InboundSeeded
  wiki_page: docs/architecture/wiki/metadata-center-mainline-source.md
  call_map_chain_id: metadata.center.mainline
node_ids:
  - MetaReq01InboundSeeded
  - MetaReq02TruthMaterialized
  - MetaReq03ContinuationAttached
  - MetaReq04RuntimeControlBound
  - MetaReq05ProviderObservationProjected
  - MetaResp06ResponseObserved
  - MetaResp07BridgeMetadataBound
  - MetaResp08CloseoutReleased
families:
  request_truth:
    write_policy: write_once
    slots:
      - requestId
      - pipelineId
      - entryEndpoint
      - sessionId
      - conversationId
      - clientRequestId
      - portScope
  continuation_context:
    write_policy: replaceable_by_owner_only
    slots:
      - responsesResume
      - previousResponseId
      - responseId
      - toolOutputs
      - continuationOwner
      - resumeFrom
      - chainId
      - stickyScope
  runtime_control:
    write_policy: replaceable_by_owner_only
    slots:
      - routeHint
      - routeName
      - routeId
      - providerProtocol
      - preCommandState
      - retryProviderKey
      - preselectedRoute
      - stopGatewayContext
      - stopless
      - stopMessageCompareContext
      - serverToolLoopState
      - stopMessageEnabled
      - stopMessageExcludeDirect
      - streamIntent
      - clientAbort
  provider_observation:
    write_policy: append_only
    slots:
      - target
      - providerKey
      - assignedModelId
      - modelId
      - clientModelId
      - compatibilityProfile
      - responseSemantics
      - finishReason
  response_observation:
    write_policy: append_only
    slots:
      - responseId
      - status
      - finishReason
      - protocolKind
  closeout_status:
    write_policy: finalize_only
    slots:
      - finalized
      - released
      - releasedAt
      - releaseReason
      - releasedByStage
  debug_snapshot:
    write_policy: append_only
    slots:
      - snapshotId
      - bridgeHistory
      - traceMarkers
provenance:
  required_fields:
    - family
    - writtenBy.module
    - writtenBy.symbol
    - writtenBy.stage
    - status
    - writePolicy
    - version
    - history
  status_values:
    - active
    - consumed
    - finalized
    - released
  write_policies:
    - write_once
    - replaceable_by_owner_only
    - append_only
    - finalize_only
stages:
  - node_id: MetaReq01InboundSeeded
    owner: ServerReqInbound01ClientRaw
    write_families:
      - request_truth
    read_families: []
  - node_id: MetaReq02TruthMaterialized
    owner: HubReqInbound02Standardized
    write_families:
      - request_truth
    read_families:
      - request_truth
  - node_id: MetaReq03ContinuationAttached
    owner: HubReqChatProcess03Governed
    write_families:
      - continuation_context
    read_families:
      - request_truth
      - continuation_context
  - node_id: MetaReq04RuntimeControlBound
    owner: VrRoute04SelectedTarget
    write_families:
      - runtime_control
    read_families:
      - request_truth
      - continuation_context
      - runtime_control
  - node_id: MetaReq05ProviderObservationProjected
    owner: HubReqOutbound05ProviderSemantic
    write_families:
      - provider_observation
    read_families:
      - request_truth
      - runtime_control
      - provider_observation
  - node_id: MetaResp06ResponseObserved
    owner: HubRespInbound02Parsed
    write_families:
      - provider_observation
      - response_observation
      - debug_snapshot
    read_families:
      - request_truth
      - continuation_context
      - runtime_control
      - provider_observation
      - response_observation
  - node_id: MetaResp07BridgeMetadataBound
    owner: HubRespChatProcess03Governed
    read_families:
      - request_truth
      - continuation_context
      - runtime_control
      - provider_observation
      - response_observation
      - debug_snapshot
  - node_id: MetaResp08CloseoutReleased
    owner: HubRespOutbound04ClientSemantic
    write_families:
      - closeout_status
      - debug_snapshot
    read_families:
      - request_truth
      - continuation_context
      - runtime_control
      - provider_observation
      - response_observation
      - closeout_status
      - debug_snapshot
boundaries:
  request_truth:
    must_not_be_overwritten_by:
      - continuation_context
      - runtime_control
      - provider_observation
      - response_observation
      - closeout_status
      - debug_snapshot
  continuation_context:
    must_not_be_overwritten_by:
      - request_truth
      - response_observation
      - closeout_status
  runtime_control:
    must_not_be_overwritten_by:
      - request_truth
      - continuation_context
      - provider_observation
      - response_observation
      - closeout_status
      - debug_snapshot
    must_not_be_written_by_stages:
      - HubRespInbound02Parsed
      - HubRespChatProcess03Governed
      - HubRespOutbound04ClientSemantic
      - ServerRespOutbound05ClientFrame
  provider_observation:
    must_not_be_overwritten_by:
      - request_truth
      - continuation_context
      - runtime_control
      - response_observation
      - closeout_status
      - debug_snapshot
  response_observation:
    must_not_be_overwritten_by:
      - request_truth
      - continuation_context
      - runtime_control
      - provider_observation
      - closeout_status
      - debug_snapshot
  closeout_status:
    must_not_be_overwritten_by:
      - request_truth
      - continuation_context
      - runtime_control
      - provider_observation
      - response_observation
      - debug_snapshot
  debug_snapshot:
    live_path_only: false
    replay_scope_required: true
verification:
  min_wiki_page: docs/architecture/wiki/metadata-center-mainline-source.md
  min_call_map_chain: metadata.center.mainline
  min_function_feature: hub.metadata_center_mainline
  required_gates:
    - npm run verify:function-map-compile-gate
    - npm run verify:architecture-mainline-call-map
    - npm run verify:architecture-wiki-sync
    - npm run verify:architecture-metadata-center-write-boundaries
    - npm run verify:metadata-center-dualwrite-api
