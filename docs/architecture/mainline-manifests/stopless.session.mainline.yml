lifecycle_id: stopless.session.mainline
summary: "Stopless three-round contract inside Chat Process boundary: every managed request injects the stop schema as a system instruction without a provider-facing stopless tool, Round-1/2 missing or invalid stops project a client-visible CLI, the next provider request receives only an ordinary user continuation plus the system schema, and Round-3 passes the original finish_reason=stop through."
