    test_design:
      - docs/goals/v3-responses-direct-mvp-test-design.md
    required_contract:
      - P6 owns only adjacent transitions V3Target10ConcreteProviderSelected through V3Server16HttpFrame
      - Runtime remains the only complete lifecycle executor
      - routecodex-v3-provider-responses is generic and contains no deployment provider ID or provider-family branch
      - Server and CLI cannot import or call Provider transport
      - no relay continuation servertool other protocol V2 compatibility fallback repair sanitize or raw replay
      - v3-rd-10 through v3-rd-12 may be anchored only by the generic Provider runtime source and controlled-upstream evidence
      - P6 Dry Run invokes the same Runtime kernel and replaces only the Provider transport with a no-network effect
    required_gates:
