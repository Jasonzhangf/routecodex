      - terminal drain permits exact-session reuse
      - early drop error and disconnect discard the connection
      - WebSocket handshake sends OpenAI-Beta responses_websockets=2026-02-06 for Codex/OpenAI Responses WebSocket mode compatibility
      - provider model auth alias and WebSocket URL form the connection identity
      - one owned guard permits only one in-flight response per connection
      - SSE emits the first provider event before terminal and never materializes the full response
      - transport handles ping pong text binary malformed missing type failed incomplete error close-before-terminal and Codex-style status_code WebSocket error events
      - Codex-style WebSocket error events preserve status/status_code and error.code/error.type while discarding the dirty connection so a client-owned retry can resend the same previous_response_id on a fresh connection
      - cancellation before connect before reused send and during read remains client_disconnect and discards any active connection
      - split UTF-8 WebSocket frames reassemble into one valid terminal event
      - same-stream WebSocket event aggregation may fill terminal JSON output only from output items and function-call argument events observed on the current WebSocket response stream; it must not read MetadataCenter debug state continuation state client projection or Hub tool governance
