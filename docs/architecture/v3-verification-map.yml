      runtime: "Verified with the actual V3 CLI and dedicated multi-listener config.p6.toml: JSON, SSE, reselection, exhaustion, Dry Run no-send, Debug trace, secret isolation, explicit Ctrl-C, and closed ports."
      forbidden_claim: "Local controlled-upstream P6 evidence does not prove relay, continuation, servertool, other protocols, V2 compatibility, global install, real ~/.rcc mutation, production replacement, or real-provider compatibility."
  - feature_id: v3.responses_provider_runtime
    status: source_verified_controlled_upstream
    change_risk: high
    owner_kind: rust_project_v3
    owner_scope: "Generic Rust Responses Provider runtime slice: selected Target -> Provider wire -> transport request -> typed raw response/source error"
    owner_modules:
      - v3/crates/routecodex-v3-provider-responses
      - v3/crates/routecodex-v3-runtime
    design:
      - docs/goals/v3-responses-direct-mvp-implementation-plan.md
      - docs/goals/v3-responses-direct-mvp-test-design.md
    contract:
      - docs/architecture/v3-resource-operation-map.yml
      - docs/architecture/v3-mainline-call-map.yml
      - docs/architecture/wiki/v3-responses-direct-mainline.md
    test_design:
      - docs/goals/v3-responses-direct-mvp-test-design.md
    required_unit:
      - Provider wire moves the request body, changes only selected wire model, and preserves client extensions
      - Provider transport resolves env and token-file auth only at send boundary
      - Provider raw response preserves JSON bytes and validated SSE event bytes
      - Provider errors stay typed for missing auth, HTTP status, transport failure, malformed SSE, and client disconnect
    required_contract:
      - routecodex-v3-provider-responses remains generic across provider IDs and contains no deployment provider branch
      - Provider consumes an already selected target and never reads config, Virtual Router, Target interpreter, route groups, or Forwarder resources
      - Server and CLI cannot import Provider transport
      - Provider node structs 12, 13, and 14 cannot be constructed by non-owner code
      - auth secret values never enter manifest, Debug, Error, Provider wire Debug, transport request Debug, or client payload
    required_gates:
      - npm run test:v3-provider-responses
      - npm run test:v3-responses-direct-blackbox
      - npm run test:v3-provider-health-contract
      - npm run verify:v3-module-boundaries
      - npm run test:v3-source-gate-red-fixtures
      - npm run test:v3-compile-fail
      - npm run verify:v3-architecture-docs
      - npm run verify:v3-rust-only
      - npm run verify:v3-static-hook-registry
      - npm run verify:v3-resource-map
      - npm run verify:v3-cargo-fmt
      - npm run verify:v3-clippy
      - npm run test:v3-workspace
    completion_rule:
      source: "Provider nodes 12-14 and adjacent edges 10-12 are bound to real Rust symbols, and Provider module blackbox passes against a controlled upstream."
      runtime: "This feature proves Provider execution only; Server /v1/responses live usability remains pending until the full Responses Direct MVP feature is completed."
      forbidden_claim: "Do not claim Server live integration, client projection completeness, relay, continuation, servertool, V2 compatibility, global install, or real ~/.rcc mutation from this provider slice."
  - feature_id: v3.debug_error_foundation
    status: p3_p4_source_and_live_verified
