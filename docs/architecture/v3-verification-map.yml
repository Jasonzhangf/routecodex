    required_contract:
      - one fixed request chain and one fixed response chain
      - entry protocol continuation ownership execution mode and provider wire protocol are independent typed axes
      - routed and pinned target resolution merge into one typed target node
      - local context save and restore are owned only by response and request Chat Process boundaries
      - immutable interval permits only round-trip-equivalent normalization scope validation storage transport expiry and release
