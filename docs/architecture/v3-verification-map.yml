      - Config publishes declarations and capabilities but never a request-specific branch decision
      - P6 remains frozen until Hub v1 Direct equivalence cutover then is physically deleted
      - Relay and new protocols fill hooks without changing or renumbering the skeleton
      - servertool followup Dry Run JSON SSE retry and Error paths use existing hook slots and the sole response exit
