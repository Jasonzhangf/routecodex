      - release-a stop followed by release-b start preserves the instance ID and republishes the canonical executable path
      - all listeners close on one stop
      - lifecycle state, argv, log, and evidence contain no resolved secret
      - live managed 5555 restart with concurrent V2 health and real JSON/SSE Responses
    required_gates:
