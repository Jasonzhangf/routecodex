entry_protocol_bindings:
  - entry_protocol: responses
    endpoint_patterns: [/v1/responses]
    execution_mode: direct
    implementation_status: implemented
    owner_feature_id: v3.responses_direct_remote_continuation_integration
    runtime_owner_symbol: execute_v3_responses_direct_runtime_kernel_with_default_transport_debug_and_continuation
    runtime_owner_path: v3/crates/routecodex-v3-runtime/src/kernel.rs
    forbidden_fallback_behavior: "Responses endpoint must not fall through to generic foundation pending."
  - entry_protocol: anthropic
    endpoint_patterns: [/v1/messages]
    execution_mode: relay
    implementation_status: implemented
    owner_feature_id: v3.anthropic_relay_runtime_integration
    runtime_owner_symbol: execute_v3_anthropic_relay_runtime_with_default_transport
    runtime_owner_path: v3/crates/routecodex-v3-runtime/src/hub_v1/anthropic_relay_runtime.rs
    forbidden_fallback_behavior: "Anthropic endpoint must not fall through to generic foundation pending."
  - entry_protocol: openai_chat
    endpoint_patterns: [/v1/chat/completions]
    execution_mode: relay
    implementation_status: implemented
    owner_feature_id: v3.openai_chat_relay_runtime_integration
    runtime_owner_symbol: execute_v3_openai_chat_relay_runtime_with_default_transport
    runtime_owner_path: v3/crates/routecodex-v3-runtime/src/hub_v1/openai_chat_relay_runtime.rs
    forbidden_fallback_behavior: "OpenAI Chat endpoint must not fall through to generic foundation pending."
  - entry_protocol: gemini
    endpoint_patterns: [/v1beta/models/:model/generateContent]
    execution_mode: pending_not_implemented
    implementation_status: pending_not_implemented
    owner_feature_id: v3.entry_protocol_endpoint_binding
    pending_owner: execute_v3_foundation_pending_runtime
    forbidden_fallback_behavior: "Gemini endpoint must not fall through to generic foundation pending."
