  - { id: sse_body_level_failure, status: controlled_verified, owner_feature_id: v3.responses_direct_sse_provider_failure_guard, required_path: first semantic SSE failure block maps to typed provider failure }
  - { id: malformed_provider_body, status: controlled_verified, owner_feature_id: v3.gemini_relay_runtime_integration, required_path: provider_error_body_malformed through Error01-06 }
  - id: timeout
    status: controlled_verified
    owner_feature_id: v3.live_provider_compat_parity_closeout
    required_path: Error01-06 typed timeout or provider transport error without success wrapping; candidate/default pool remains reroutable until exhausted
    controlled_evidence: { status: controlled_verified, refs: [scripts/tests/provider-failure-ban-blackbox.mjs, docs/goals/provider-error-reroutable-until-pool-and-default-empty.md], gates: [npm run verify:provider-failure-ban-blackbox], scenario: scenarioTimeout, proves: primaryHits=1 backupHits=1 clientStatus=200 }
