error_cases:
  - { id: http_401, status: pending, owner_feature_id: v3.live_provider_compat_parity_closeout, required_path: Error01-06 typed provider authentication failure }
  - { id: http_402, status: controlled_verified, owner_feature_id: v3.responses_direct_sse_provider_failure_guard, required_path: SSE or HTTP provider billing failure becomes typed provider error before client success }
  - { id: http_403, status: pending, owner_feature_id: v3.live_provider_compat_parity_closeout, required_path: Error01-06 typed provider authorization failure }
  - { id: http_429, status: controlled_verified, owner_feature_id: v3.openai_chat_relay_runtime_integration, required_path: Error01-06 provider rate limit projection without success wrapping }
  - { id: http_5xx, status: pending, owner_feature_id: v3.live_provider_compat_parity_closeout, required_path: Error01-06 retryable provider runtime failure }
  - { id: sse_body_level_failure, status: controlled_verified, owner_feature_id: v3.responses_direct_sse_provider_failure_guard, required_path: first semantic SSE failure block maps to typed provider failure }
  - { id: malformed_provider_body, status: controlled_verified, owner_feature_id: v3.gemini_relay_runtime_integration, required_path: provider_error_body_malformed through Error01-06 }
  - { id: timeout, status: pending, owner_feature_id: v3.live_provider_compat_parity_closeout, required_path: typed timeout or provider transport error without success wrapping }
  - { id: disconnect, status: controlled_verified, owner_feature_id: v3.responses_websocket_v2_transport_hardening, required_path: client_disconnect remains health-neutral and discards active WebSocket connection }
  - { id: cancel, status: controlled_verified, owner_feature_id: v3.responses_websocket_v2_transport_hardening, required_path: cancellation before connect or send or read remains typed and clears dirty connection }
