error_cases:
  - id: http_401
    status: controlled_verified
    owner_feature_id: v3.live_provider_compat_parity_closeout
    required_path: Error01-06 typed provider authentication failure; candidate/default pool remains reroutable until exhausted
    controlled_evidence: { status: controlled_verified, refs: [scripts/tests/provider-failure-ban-blackbox.mjs, docs/goals/provider-error-reroutable-until-pool-and-default-empty.md], gates: [npm run verify:provider-failure-ban-blackbox], scenario: scenario401, proves: primaryHits=1 backupHits=1 clientStatus=200 }
    live_evidence: { status: live_pending, refs: [docs/goals/v3-live-provider-compat-parity-closeout-plan.md], gates: [], blockers: [production_credentials_must_not_be_mutated_for_auth_error] }
  - { id: http_402, status: controlled_verified, owner_feature_id: v3.responses_direct_sse_provider_failure_guard, required_path: SSE or HTTP provider billing failure becomes typed provider error before client success }
  - id: http_403
    status: controlled_verified
    owner_feature_id: v3.live_provider_compat_parity_closeout
    required_path: Error01-06 typed provider authorization failure; candidate/default pool remains reroutable until exhausted
    controlled_evidence: { status: controlled_verified, refs: [scripts/tests/provider-failure-ban-blackbox.mjs, docs/goals/provider-error-reroutable-until-pool-and-default-empty.md], gates: [npm run verify:provider-failure-ban-blackbox], scenario: scenario403, proves: primaryHits=1 backupHits=1 clientStatus=200 }
    live_evidence: { status: live_pending, refs: [docs/goals/v3-live-provider-compat-parity-closeout-plan.md], gates: [], blockers: [production_credentials_must_not_be_mutated_for_authorization_error] }
  - { id: http_429, status: controlled_verified, owner_feature_id: v3.openai_chat_relay_runtime_integration, required_path: Error01-06 provider rate limit projection without success wrapping }
  - id: http_5xx
    status: controlled_verified
    owner_feature_id: v3.live_provider_compat_parity_closeout
    required_path: Error01-06 retryable provider runtime failure; candidate/default pool remains reroutable until exhausted
    controlled_evidence: { status: controlled_verified, refs: [scripts/tests/provider-failure-ban-blackbox.mjs, docs/goals/provider-error-reroutable-until-pool-and-default-empty.md], gates: [npm run verify:provider-failure-ban-blackbox], scenario: scenario503, proves: primaryHits>=1 backupHits>=1 clientStatus=200 }
