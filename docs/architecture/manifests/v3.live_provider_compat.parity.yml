    live_evidence: { status: pending, refs: [], blockers: [V3 live /v1/models capability projection pending] }
    required_fields: [supports_reasoning_summaries, support_verbosity, supports_parallel_tool_calls, context_window, max_context_window, supports_search_tool, use_responses_lite, tool_mode, input_modalities]
production_blockers:
