  - { blocker_id: responses_websocket_v2_live_endpoint_pending, owner_feature_id: v3.responses_direct_remote_continuation_integration, evidence: MEMORY.md }
  - { blocker_id: live_relay_cutover_pending, owner_feature_id: v3.hub_relay_runtime_closeout, evidence: docs/architecture/wiki/v3-hub-relay-fixed-pipeline.md }
  - { blocker_id: live_provider_replay_matrix_pending, owner_feature_id: v3.live_provider_compat_parity_closeout, evidence: docs/goals/v3-live-provider-compat-parity-closeout-plan.md }
live_read_only_audit:
