lifecycle_id: v3.live_provider_compat.parity
owner_feature_id: v3.live_provider_compat_parity_closeout
summary: V3 live provider compatibility parity matrix, separating controlled/source evidence from live/provider evidence and production blockers.
entrypoint:
  node_id: V3LiveCompat01MatrixDeclared
return_path:
  node_id: V3LiveCompat04ProductionReadinessProjected
call_map_chain_id: v3.live_provider_compat.parity
node_ids:
  - V3LiveCompat01MatrixDeclared
  - V3LiveCompat02ControlledEvidenceBound
  - V3LiveCompat03LiveEvidenceBound
  - V3LiveCompat04ProductionReadinessProjected
evidence_levels:
  controlled_verified: Controlled loopback/source/test evidence exists and is linked.
  live_verified: Live/provider replay evidence exists and is linked.
  live_pending: Live/provider replay is intentionally not claimed and has named blockers.
  pending: Required evidence is intentionally not claimed yet.
  blocker: Required evidence is blocked by a named owner backlog or external provider/config condition.
production_policy:
  no_fallback: true
  provider_specific_hub_vr_forbidden: true
  production_ready_requires:
    - controlled_evidence.status == controlled_verified
    - live_evidence.status == live_verified
    - production.status == ready
    - production.blockers is empty
  pending_or_blocker_must_not_claim_ready: true
axes:
  endpoints: [responses_direct, responses_relay, anthropic_messages, openai_chat_completions, gemini_generate_content]
  transports: [json_http, sse_http, websocket_v2]
  scenario_groups: [text, tool, image, error]
