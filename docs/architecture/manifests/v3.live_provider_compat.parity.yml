node_ids:
  - V3LiveCompat01MatrixDeclared
  - V3LiveCompat02ControlledEvidenceBound
  - V3LiveCompat03LiveEvidenceBound
  - V3LiveCompat04ProductionReadinessProjected
evidence_levels:
  controlled_verified: Controlled loopback/source/test evidence exists and is linked.
  live_verified: Read-only live/provider replay evidence exists and is linked.
  pending: Required evidence is intentionally not claimed yet.
  blocker: Required evidence is blocked by a named owner backlog or external provider/config condition.
production_policy:
  no_fallback: true
  provider_specific_hub_vr_forbidden: true
  production_ready_requires:
    - controlled_evidence.status == controlled_verified
    - live_evidence.status == live_verified
    - production.status == ready
    - production.blockers is empty
  pending_or_blocker_must_not_claim_ready: true
