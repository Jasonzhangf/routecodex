lifecycle_id: metadata.center.mainline
summary: "single request-scoped metadata center mainline: one bound center flows
  across server -> Hub Pipeline -> provider/runtime -> response closeout;
  request truth is materialized once, continuation/runtime/provider observation
  attach as separate families, and later stages consume read-only projections
  before closeout release."
owner_feature_id: hub.metadata_center_mainline
entrypoint:
  node_id: MetaReq01InboundSeeded
  wiki_page: docs/architecture/wiki/metadata-center-mainline-source.md
  call_map_chain_id: metadata.center.mainline
