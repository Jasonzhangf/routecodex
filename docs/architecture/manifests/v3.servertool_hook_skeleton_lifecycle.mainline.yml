lifecycle_id: v3.servertool_hook_skeleton_lifecycle
owner_feature_id: v3.servertool_hook_skeleton_lifecycle
summary: V3 StoplessCenter first built-in servertool hook. Stopless runs only inside Chat Process: Resp03 updates runtime_control StoplessCenter and projects no-op CLI/terminal text before continuation commit; Req04 consumes no-op CLI as current-turn evidence and reads StoplessCenter from runtime_control before request tool governance.
entrypoint:
  node_id: V3HubReqChatProcess04Governed
return_path:
  node_id: V3HubRespChatProcess03Governed
call_map_chain_id: v3.servertool_hook_skeleton_lifecycle
node_ids:
  - V3HubReqContinuation03Classified
  - V3HubReqChatProcess04Governed
  - V3StoplessReq01RuntimeControlLoaded
  - V3StoplessReq02NoopCliConsumed
  - V3StoplessReq03GuidanceToolInjected
  - V3HubRespChatProcess03Governed
  - V3StoplessResp01ReasoningStopInspected
  - V3StoplessResp02RuntimeControlUpdated
  - V3StoplessResp03NoopCliOrTerminalProjected
  - V3HubRespContinuation04Committed
edges:
  - { step_id: v3-servertool-stopless-req-01, from_node: V3HubReqContinuation03Classified, to_node: V3HubReqChatProcess04Governed, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-req-02, from_node: V3HubReqChatProcess04Governed, to_node: V3StoplessReq01RuntimeControlLoaded, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-req-03, from_node: V3StoplessReq01RuntimeControlLoaded, to_node: V3StoplessReq02NoopCliConsumed, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-req-04, from_node: V3StoplessReq02NoopCliConsumed, to_node: V3StoplessReq03GuidanceToolInjected, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-resp-01, from_node: V3HubRespChatProcess03Governed, to_node: V3StoplessResp01ReasoningStopInspected, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-resp-02, from_node: V3StoplessResp01ReasoningStopInspected, to_node: V3StoplessResp02RuntimeControlUpdated, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-resp-03, from_node: V3StoplessResp02RuntimeControlUpdated, to_node: V3StoplessResp03NoopCliOrTerminalProjected, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
  - { step_id: v3-servertool-stopless-resp-04, from_node: V3StoplessResp03NoopCliOrTerminalProjected, to_node: V3HubRespContinuation04Committed, status: anchored, owner_feature_id: v3.servertool_hook_skeleton_lifecycle }
verification_gates:
  - npm run verify:v3-normalization-payload-logic-boundary
  - npm run test:v3-normalization-payload-logic-boundary-red-fixtures
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test hub_relay_stopless_center_semantics -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test hub_relay_response_semantics -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test hub_relay_request_semantics -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test hub_relay_response_stopless_live_shapes -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test hub_relay_tool_servertool_multiturn_parity -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test responses_relay_local_continuation_integration -- --nocapture
  - cargo test --manifest-path v3/Cargo.toml -p routecodex-v3-runtime --test responses_direct_tool_passthrough -- --nocapture
normalization_boundary:
  req_inbound_logic: forbidden
  resp_inbound_logic: forbidden
  req_outbound_logic: forbidden
  resp_outbound_logic: forbidden
completion_boundary:
  controlled_runtime: true
  live_cutover: false
  servertool_followup_reenter: false
  global_install_restart: false
