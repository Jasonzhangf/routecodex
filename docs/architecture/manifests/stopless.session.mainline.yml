lifecycle_id: stopless.session.mainline
summary: "Stopless three-round contract inside Chat Process boundary: every
  managed relay request injects the stop schema as a system instruction plus
  exactly one provider-facing/model-visible internal reasoningStop tool,
  Round-1/2 missing or invalid stops project a client-visible CLI, the next
  provider request receives only an ordinary user continuation plus the fresh
  schema/tool contract, and Round-3 passes the original finish_reason=stop
  through."
owner_feature_id: hub.servertool_stopless_cli_continuation
