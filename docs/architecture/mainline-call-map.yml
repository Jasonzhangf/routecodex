        to_node: ServertoolReqHook03ToolInjected
        owner_feature_id: binding pending
        semantic_input: "request semantic after optional text rewrite"
        semantic_output: "request tool declarations, stop hook contract, and tool constraints injected for servertool-managed turns"
        status: binding pending
        binding_pending: true
        note: "Required for servertool-managed turns."
      - step_id: sth-req-04
        from_node: ServertoolReqHook03ToolInjected
        to_node: ServertoolReqHook04RequestFinalized
        owner_feature_id: binding pending
        semantic_input: "request semantic with parsed result/rewrite/tool injection events"
        semantic_output: "final request semantic ready for HubReqChatProcess03Governed"
        status: binding pending
        binding_pending: true
        note: "Required request finalize hook."
      - step_id: sth-req-05
        from_node: ServertoolReqHook04RequestFinalized
        to_node: HubReqChatProcess03Governed
        owner_feature_id: binding pending
        semantic_input: "final servertool-governed request semantic"
        semantic_output: "normal Hub request chat-process governed semantic"
        status: binding pending
        binding_pending: true
        note: "Must return to normal Hub request chain."

