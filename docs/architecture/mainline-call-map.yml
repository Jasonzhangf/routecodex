          consumes: [response.hub_semantic, metadata.runtime_control]
          produces: [servertool.followup_state]
          side_channel_reads: [metadata.runtime_control]
          side_channel_writes: [servertool.followup_state]
        status: anchored
        note: "Anchored by Rust Hub response governance calling the stopless response hook skeleton before continuation save, outbound mapping, or SSE projection."
      - step_id: sth-resp-02
        from_node: ServertoolRespHook01Intercepted
        to_node: ServertoolRespHook02SchemaValidated
        caller_symbol: run_stopless_response_hook
        caller_file: sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/servertool_stopless_hook.rs
        callee_symbol: inspect_stop_gateway_signal
        callee_file: sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/servertool_core_blocks.rs
