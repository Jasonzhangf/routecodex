# RouteCodex mainline call map
# Purpose:
# - bind request/response/error mainlines to concrete caller/callee edges
# - supplement function-map owner registry with executable call-path indexing
# - prevent edits on facade/wrapper/transitional layers when truth owner is elsewhere
version: 1
status: seed

chains:
  - chain_id: servertool.hook_skeleton.mainline
    summary: "Servertool standard hook skeleton: CLI remains the business execution lifecycle, while request/result injection, response interception, schema validation, hook response injection, followup/reenter effect planning, and finalization are governed by Rust-owned required/optional hooks."
    entry_contract:
      node: HubRespChatProcess03Governed
      owner_doc: docs/architecture/wiki/servertool-hook-skeleton-mainline-source.md
    edges:
      - step_id: sth-resp-01
        from_node: HubRespChatProcess03Governed
        to_node: ServertoolRespHook01Intercepted
        owner_feature_id: binding pending
        semantic_input: "canonical provider response after Hub response chat-process parsing"
        semantic_output: "response interception event for normal response, abnormal/error response, stopless trigger, `finish_reason=stop` schema candidate, `finish_reason=tool_calls` registered internal servertool call candidate, or no-op"
        status: binding pending
        binding_pending: true
        note: "Target standard skeleton edge. Current runtime still uses TS transitional servertool orchestration; do not bind to TS symbols."
      - step_id: sth-resp-02
        from_node: ServertoolRespHook01Intercepted
        to_node: ServertoolRespHook02SchemaValidated
        owner_feature_id: binding pending
        semantic_input: "response interception event plus skeleton-selected schema source: assistant text/fence for `finish_reason=stop`, or registered internal servertool arguments for `finish_reason=tool_calls` such as `reasoningStop.arguments`"
        semantic_output: "single schema validation event covering valid terminal, non-terminal/still-running, empty schema/no_schema, invalid schema, malformed args, already-terminal cases, and client-projection-required cases"
        status: binding pending
        binding_pending: true
        note: "Required for schema-managed flows; missing/invalid schema must not be silently accepted. `reasoningStop` is internal/model-facing and must not be returned to the client as raw required_action."
      - step_id: sth-resp-03
        from_node: ServertoolRespHook02SchemaValidated
        to_node: ServertoolRespHook03HookResponseInjected
        owner_feature_id: binding pending
        semantic_input: "schema validation pass/deny/error event"
        semantic_output: "terminal-stop summary projection when schema passes, or client-visible shell `exec_command(routecodex hook run reasoningStop ...)` projection plan when feedback/client execution is required"
        status: binding pending
        binding_pending: true
        note: "Business execution remains client-visible CLI; hook only plans injection/projection. Client-visible continuation uses shell exec_command only, never raw internal `reasoningStop`."
      - step_id: sth-resp-04
        from_node: ServertoolRespHook03HookResponseInjected
        to_node: ServertoolRespHook04FollowupPlanned
        owner_feature_id: binding pending
        semantic_input: "post hook-response projection event plus backend-route/server-side runtime trigger state"
        semantic_output: "optional origin-snapshot followup effect plan or no-op event"
        status: binding pending
        binding_pending: true
        note: "Optional hook. Must emit no-op when not applicable; must not guess from polluted current payload."
      - step_id: sth-resp-05
        from_node: ServertoolRespHook04FollowupPlanned
        to_node: ServertoolRespHook05ReenterDispatched
        owner_feature_id: binding pending
        semantic_input: "optional followup effect plan"
        semantic_output: "optional reenter/clientInject/providerInvoke IO effect plan or no-op event"
        status: binding pending
        binding_pending: true
        note: "TS may execute IO effect later, but retry/backoff/terminal policy must be Rust-owned."
      - step_id: sth-resp-06
        from_node: ServertoolRespHook05ReenterDispatched
        to_node: ServertoolRespHook06ProjectionFinalized
        owner_feature_id: binding pending
        semantic_input: "post-intercept/post-followup governed response candidate plus hook events"
        semantic_output: "final governed response truth with internal tool stripped and client projection handoff selected"
        status: binding pending
        binding_pending: true
        note: "Required finalize hook; servertool must not have a second response projector."
      - step_id: sth-resp-07
        from_node: ServertoolRespHook06ProjectionFinalized
        to_node: HubRespOutbound04ClientSemantic
        owner_feature_id: binding pending
        semantic_input: "final servertool governed response truth"
        semantic_output: "normal Hub response outbound client semantic"
        status: binding pending
        binding_pending: true
        note: "Must return to normal Hub response chain."
      - step_id: sth-cli-01
        from_node: ServertoolRespHook03HookResponseInjected
        to_node: ServertoolCli04ClientExecuted
        owner_feature_id: binding pending
        semantic_input: "client-visible exec_command projection plan"
        semantic_output: "client executes `routecodex hook run <toolName> --input-json <json>` and returns ordinary tool result"
        status: binding pending
        binding_pending: true
        note: "Business CLI lifecycle edge; hook does not execute client CLI."
      - step_id: sth-req-01
        from_node: HubReqInbound02Standardized
        to_node: ServertoolReqHook01ResultParsed
        owner_feature_id: binding pending
        semantic_input: "next request containing ordinary tool result / CLI stdout"
        semantic_output: "parsed public hook result event, including restoration of shell-executed stop hook results back to model-visible `reasoningStop -> function_call_output`, or no-op when no servertool result exists"
        status: binding pending
        binding_pending: true
        note: "Required when tool result exists."
      - step_id: sth-req-02
        from_node: ServertoolReqHook01ResultParsed
        to_node: ServertoolReqHook02TextRewritten
