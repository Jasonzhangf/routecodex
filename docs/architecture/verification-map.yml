  - feature_id: hub.servertool_stopless_cli_continuation
    change_risk: high
    unit:
      - sharedmodule/llmswitch-core/rust-core/crates/servertool-core/src/stopless_orchestration_contract.rs
      - sharedmodule/llmswitch-core/rust-core/crates/servertool-core/src/cli_contract.rs
      - sharedmodule/llmswitch-core/rust-core/crates/servertool-core/src/persisted_lookup.rs
      - sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/hub_pipeline_lib/engine.rs
      - sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/hub_pipeline_lib/effect_plan.rs
      - sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/servertool_core_blocks.rs
      - src/modules/llmswitch/bridge/native-exports.ts
      - sharedmodule/llmswitch-core/src/servertool/types.d.ts
      - sharedmodule/llmswitch-core/src/servertool/types.d.ts
    contract:
      - tests/servertool/stopless-metadata-center.spec.ts
      - tests/servertool/servertool-cli-native-bridge.spec.ts
      - tests/servertool/stop-schema-lifecycle-contract.spec.ts
      - tests/responses/responses-openai-bridge.spec.ts
      - tests/servertool/servertool-cli-result-restore.spec.ts
      - scripts/tests/stopless-invalid-schema-blackbox.mjs
      - tests/sharedmodule/hub-pipeline-preselected-route.spec.ts
      - tests/sharedmodule/native-required-exports-sse-stream.spec.ts
    integration:
      - tests/servertool/stopless-metadata-center.spec.ts
      - sharedmodule/llmswitch-core/rust-core/crates/router-hotpath-napi/src/req_process_stage1_tool_governance_tests.rs
    smoke:
      - npm run verify:stopless-invalid-schema-blackbox
      - npm run verify:servertool-rust-only
      - npm run verify:function-map-compile-gate
    build:
      - npm run build:base
    notes:
      - "Validation must prove stopless request-side restore/guidance rewrite/schema-contract reinjection happens on the Chat Process request boundary after `/v1/responses` continuation restore and before normal request governance; response-side stop/schema/reasoningStop normalization must happen on the Chat Process response boundary before continuation save and before RespOutbound."
      - "Validation must prove the response-side stopless hook is executed as the standard `ServertoolRespHook` skeleton inside Rust Hub RespChatProcess, and that outbound/SSE layers only receive the finalized semantic payload."
      - "stopless is a Rust-owned CLI continuation: progression truth comes from runtime metadata plus current request tool_output, and `StoplessExecutionPlan` must compose request-truth session/control state and expose `cli_projection` for non-terminal stop_message_flow."
      - "Validation must prove stop hook injection is unconditional for stopless-managed relay turns; if the hook is absent, the only allowed escape hatch is the 3-round loop guard stop."
      - "Validation must prove direct/provider-direct runtime routeName disables stopless CLI projection entirely, so direct `/v1/responses` never emits the public `reasoningStop` CLI."
      - "Engine must project stopless to a client-visible `exec_command` and must not call `reenterPipeline` for stopless CLI flows."
      - "Validation must prove TS engine orchestration calls Rust `planStoplessExecutionJson` and does not build stopless `context.stopless`, `context.requestTruth`, or session truth locally."
      - "Command input must stay concise (`flowId/repeatCount/maxRepeats/triggerHint` plus optional structured `schemaFeedback{reasonCode,missingFields}`); CLI stdout must carry continuationPrompt/schemaGuidance plus structured feedback for req_chatprocess rewrite."
      - "Validation must prove the client-visible stopless command uses alias `reasoningStop` and the client payload does not expose `__servertool_cli_projection`."
      - "Validation must prove NoSchema model-facing schema guidance is present through the provider-visible system instruction and `reasoningStop` tool description/schema, while CLI stdout keeps public `input.triggerHint=no_schema` and current-request restoration advances repeatCount 1 -> 2 -> 3."
      - "Validation must prove req_chatprocess rewrites the paired stopless tool result into model-transparent natural language + missing/error feedback, and VR still routes that turn to thinking."
      - "Validation must prove `/v1/responses` stopless turns do not lose the schema contract between req_chatprocess and the responses->chat bridge: req owner must preserve the contract in `instructions`, and bridge owner must materialize it into the outbound system message."
      - "Validation must prove stopless CLI projection/CLI execution uses write-once `request_truth.sessionId/requestId` for identity, and that Rust-produced `MetadataCenter.runtime_control.stopless` plus current request tool_output are the only progression truth while `sessionDir` and any persisted writeback path remain absent."
      - "Validation must prove missing/blank current request-truth `sessionId` disables stopless interception, writes no stopless runtime state, emits `stopless_missing_session_id`, and lets the model stop naturally."
      - "Validation must prove repeatCount is same-session consecutive missing/invalid-schema only: non-stop progress or ordinary tool calls reset it to 0, valid terminal schema and `simple_question=true` clear it, and a different `sessionId` starts from repeatCount=1 instead of inheriting stale state."
      - "Validation must prove ReqChatProcess emits `metadata.runtime_control.stopless`, the TS request-stage shell only writes that Rust plan into the bound MetadataCenter, and missing binding fails fast."
      - "Retired zero-consumer stop-message auto TS wrapper `native-stop-message-auto-semantics.ts` must stay physically deleted; stop-message decision/schema tests must use direct Rust/NAPI `decideStopMessageAction` and `evaluateStopSchemaGateJson` evidence."
      - "Validation must prove response-side stopless activation reads the live `MetadataCenter.runtime_control.stopless.active` shape carried through the current request, so submit_tool_outputs rounds cannot bypass the response hook."
      - "Validation must prove MetadataCenter never carries `responsesRequestContext` or any request/context payload mirror, and continuation control cannot materialize request session truth, stopless activation, stop-message scope, or state keys."
      - "The stop contract is dual-gated: `finish_reason=stop` only triggers evaluation; terminal stop still requires a valid terminal schema or the temporary three-round safety guard."
      - "If stop arrives without schema, validation must prove the same stop hook is auto-projected with zero schema input and its result tells the model to provide schema / call the same hook before terminal stop."
      - "If stop arrives with invalid/non-terminal/malformed schema arguments, validation must prove the same stop hook is auto-projected with schema-derived input and returns corrective guidance."
      - "For malformed/invalid schema, validation must prove the hook result includes parse/interpretation feedback plus explicit field/value/shape errors, not only a generic deny-stop message."
      - "Validation must prove stop schema missingFields are conditional, not all-fields-required: `simple_question=true` allows natural stop without `stopreason`; otherwise `stopreason` is unconditional; `stopreason=0` needs `has_evidence=1` plus `evidence`; `stopreason=1` needs `reason` only; `stopreason=2` needs `next_step`; diagnostic fields are not globally mandatory."
      - "Validation must prove `simple_question=false` or absent still requires `stopreason`, and client-visible terminal payload strips any `simple_question` schema control text."
      - "Validation must prove `stopreason=2 + next_step` sends the next_step content back to the model as the continuation text, while `blocked + needs_user_input=true` returns summary plus the user decision question to the client and terminates with stop."
      - "If stop arrives with valid terminal schema, validation must prove stop is allowed even when the model did not proactively call the stop hook."
      - "Validation must also prove the auto-projected stopless CLI result is rewritten on the next request into text guidance, not replayed back to the model as if the model had initiated that tool call."
      - "Validation must prove client-visible stopless prose is ordinary assistant text and not `reasoning_text` / `reasoning_content` / `reasoning.summary`; `function_call_output` remains only the next-turn model-side restore shape."
      - "Focused Rust gates: `cargo test -p servertool-core stopless --lib -- --nocapture`, `cargo test -p servertool-core cli_contract --lib -- --nocapture`, and `cargo test -p servertool-core persisted_lookup --lib -- --nocapture`."
      - "Focused TS gate: `node --experimental-vm-modules ./node_modules/.bin/jest tests/servertool/stopless-metadata-center.spec.ts tests/servertool/servertool-cli-native-bridge.spec.ts tests/servertool/servertool-cli-result-restore.spec.ts --runInBand`."

