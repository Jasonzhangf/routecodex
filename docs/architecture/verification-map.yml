    notes:
      - Any provider outbound metadata change must rerun provider metadata boundary suite.
      - Hub/VR contract help must expose standard `controlIn` / `controlOut` and `dataIn` / `dataOut` interfaces for every typed node.
      - Retired image attachment metadata native export/module must stay deleted; media metadata semantics must use live Hub/Rust mainline owners only.
      - Retired zero-consumer native exports (`extractWebSearchSemanticsHintJson`, `normalizeReasoningInOpenAIPayloadJson`, `governToolNameResponseJson`, `resolveDefaultToolGovernanceRulesJson`) must stay deleted; do not restore standalone hint/reasoning-alias/response-governance/default-rules control surfaces.
      - Retired standalone tool-governance native export/file (`governRequestJson`, `hub_tool_governance_semantics.rs`) must stay deleted; request/tool governance must remain in the active Hub Rust mainline owners.
      - Retired zero-consumer response-tool NAPI export (`collectToolNamesFromCandidateJson` / `collect_tool_names_from_candidate_json`) must stay deleted while the internal helper remains Rust-private to active response governance.
      - Retired zero-consumer utility NAPI exports (`cleanMalformedRoutingInstructionMarkersJson`, `runHashlineNativeEditJson`) must stay deleted; do not expose internal VR cleanup/hashline helpers as standalone NAPI surfaces without runtime consumers.
      - Retired zero-consumer passthrough-mode NAPI exports (`buildPassthroughGovernanceSkippedNodeJson`, `resolveHasInstructionRequestedPassthroughJson`, `resolveActiveProcessModeJson`, `buildPassthroughAuditJson`, `annotatePassthroughGovernanceSkipJson`, `attachPassthroughProviderInputAuditJson`) must stay deleted; do not restore standalone passthrough wrappers without a live TS/runtime consumer and owner map update.
      - Retired heavy-input fastpath native export/wrapper/parser/test must stay deleted; no second request fastpath control surface outside Rust Hub mainline.
      - Retired target-utils native export/module must stay deleted; target application belongs to the Rust request route-select mainline, not a standalone zero-consumer NAPI control surface.
      - Retired standalone SSE sniffer helper native exports must stay deleted; SSE helper decisions remain Rust-internal to the active SSE parse exports.
      - Retired provider-key native export/wrapper/parser must stay deleted; provider-key log parsing does not justify a Rust/NAPI control surface without runtime consumers.
      - Retired stop-message state codec native export/module must stay deleted; no zero-consumer standalone state codec control surface outside current servertool-core state contracts.

