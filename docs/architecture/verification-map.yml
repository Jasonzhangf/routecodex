    integration:
      - tests/server/handlers/responses-handler.servertool-cli-projection.blackbox.spec.ts
    smoke:
      - npm run verify:architecture-ci
    build:
      - npm run build:min
    notes:
      - Phase 1 must prove intercepted servertools return reasoning + exec_command CLI call and do not invoke server-side followup/reenter.
      - Submit-tool-output restoration must preserve original model tool call identity for protocol symmetry.

