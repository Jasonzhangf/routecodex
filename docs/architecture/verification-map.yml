    build:
      - npm run build:min
    notes:
      - Phase 1 must prove intercepted servertools return reasoning + exec_command CLI call and do not invoke server-side followup/reenter.
      - Ticket-backed submit restoration is removed; submitted exec_command results remain standard client tool outputs.
      - stop_message_auto lifecycle must prove CLI input/output carries continuationPrompt, repeatCount, maxRepeats, and does not re-project after CLI output returns.

