      - npm run verify:responses-direct-tool-shape-native-availability
      - npm run verify:responses-direct-tool-shape-no-ts-fallback
      - npm run test:ci:jest
    build:
      - npm run build:min
    notes:
      - Rust now owns the contract; direct/provider guards must remain thin shells around the native validator, shared direct passthrough body builder, shared direct route decision helper, shared `apply_patch` relay detector, and shared direct routeParams override helper.
      - same-protocol direct skip/relay regressions for `apply_patch` servertool mode and Responses custom `apply_patch` declarations must remain in CI, not local-only route tests.
