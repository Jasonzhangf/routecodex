# RouteCodex verification map
# Purpose:
# - feature -> minimum required verification stack
# - stop test selection by memory only

version: 1
verification:
  - feature_id: architecture.resource_ownership_model
    change_risk: high
    unit:
      - docs/architecture/resource-operation-map.yml
      - docs/architecture/resource-taxonomy.md
      - scripts/architecture/verify-resource-operation-map.mjs
      - scripts/architecture/verify-resource-source-bindings.mjs
      - scripts/architecture/audit-resource-global-coverage.mjs
      - scripts/tests/resource-source-bindings-red-fixtures.mjs
    contract:
      - scripts/architecture/verify-resource-operation-map.mjs
      - scripts/architecture/verify-resource-source-bindings.mjs
      - scripts/tests/resource-source-bindings-red-fixtures.mjs
      - scripts/architecture/audit-resource-global-coverage.mjs
    integration:
      - docs/architecture/function-map.yml
      - docs/architecture/mainline-call-map.yml
      - docs/architecture/verification-map.yml
      - docs/architecture/resource-global-coverage-report.json
    smoke:
      - npm run audit:resource-global-coverage
      - npm run verify:resource-operation-map
      - npm run verify:resource-owner-uniqueness
      - npm run verify:resource-mainline-bindings
      - npm run verify:resource-forbidden-writes
      - npm run verify:resource-side-channel-isolation
      - npm run verify:resource-source-bindings
      - npm run test:resource-source-bindings-red-fixtures
      - npm run verify:function-map-compile-gate
      - npm run verify:architecture-mainline-call-map
    build:
      - npm run build:base
    notes:
      - "M0 resource ownership is map/gate only. Do not start runtime refactors until resource ownership and mainline resource flow are green."

