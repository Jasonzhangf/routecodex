# RouteCodex 主用户配置 (V2)
# 路径: ~/.rcc/config.toml
# 格式: TOML — 支持完整注释

version = "2.0.0"

#------------------------------------------------------------------------------
# HTTP 服务器配置
# per-port 独立配置：每个端口必须显式声明 mode + 专属字段
# - router 端口必须指定 routingPolicyGroup
# - provider 端口必须指定 providerBinding + protocolBehavior
#------------------------------------------------------------------------------
[httpserver]
port = 5520
host = "127.0.0.1"

# Router 端口 10000：绑定 coding group → deepseek v4-flash + mini27
[[httpserver.ports]]
port = 10000
host = "0.0.0.0"
mode = "router"
routingPolicyGroup = "coding"

# Router 端口 5520：绑定 default group
[[httpserver.ports]]
port = 5520
host = "0.0.0.0"
mode = "router"
routingPolicyGroup = "default"

# Provider 端口 5555：直连 dbittai-gpt gpt-5.4
[[httpserver.ports]]
port = 5555
host = "0.0.0.0"
mode = "provider"
protocolBehavior = "auto"
providerBinding = "dbittai-gpt.gpt-5.4"

#------------------------------------------------------------------------------
# Virtual Router 模式 (V2 only)
# routingPolicyGroup 接管 per-port 路由决策
#------------------------------------------------------------------------------
virtualrouterMode = "v2"

[virtualrouter]
# 策略库：routingPolicyGroups 只是命名路由集合
# 真正生效的 group 由 httpserver.ports[].routingPolicyGroup 决定

#------------------------------------------------------------------------------
# 策略组: coding (router 端口 10000 绑定)
# 核心模型: deepseek-v4-flash (thinking/coding/longcontext)
# 备份模型: mini27 MiniMax-M2.7 (tools 场景)
#------------------------------------------------------------------------------
[virtualrouter.routingPolicyGroups."coding"]

# thinking → deepseek v4-flash 为主
[[virtualrouter.routingPolicyGroups."coding".routing.thinking]]
id = "coding-thinking-deepseek-flash"
priority = 200
mode = "weighted"
targets = ["deepseek.deepseek-v4-flash"]
[virtualrouter.routingPolicyGroups."coding".routing.thinking.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."coding".routing.thinking.loadBalancing.weights]
"deepseek.deepseek-v4-flash" = 10

# coding → deepseek v4-flash
[[virtualrouter.routingPolicyGroups."coding".routing.coding]]
id = "coding-coding-deepseek-flash"
priority = 200
mode = "weighted"
targets = ["deepseek.deepseek-v4-flash"]
[virtualrouter.routingPolicyGroups."coding".routing.coding.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."coding".routing.coding.loadBalancing.weights]
"deepseek.deepseek-v4-flash" = 10

# tools → mini27 为主，deepseek 备用
[[virtualrouter.routingPolicyGroups."coding".routing.tools]]
id = "coding-tools-mini27-backup"
priority = 200
mode = "weighted"
targets = ["mini27.MiniMax-M2.7", "deepseek.deepseek-v4-flash"]
[virtualrouter.routingPolicyGroups."coding".routing.tools.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."coding".routing.tools.loadBalancing.weights]
"mini27.MiniMax-M2.7" = 8
"deepseek.deepseek-v4-flash" = 3

# longcontext → deepseek v4-flash
[[virtualrouter.routingPolicyGroups."coding".routing.longcontext]]
id = "coding-longcontext-deepseek-flash"
priority = 200
mode = "weighted"
targets = ["deepseek.deepseek-v4-flash"]
[virtualrouter.routingPolicyGroups."coding".routing.longcontext.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."coding".routing.longcontext.loadBalancing.weights]
"deepseek.deepseek-v4-flash" = 10

# default → deepseek v4-flash
[[virtualrouter.routingPolicyGroups."coding".routing.default]]
id = "coding-default-deepseek-flash"
priority = 200
mode = "weighted"
targets = ["deepseek.deepseek-v4-flash"]
[virtualrouter.routingPolicyGroups."coding".routing.default.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."coding".routing.default.loadBalancing.weights]
"deepseek.deepseek-v4-flash" = 10

[virtualrouter.routingPolicyGroups."coding".session]
enabled = true
tickMs = 1500
retentionMs = 1200000
holdNonStreaming = true
holdMaxMs = 60000

#------------------------------------------------------------------------------
# 策略组: default (router 端口 5520 绑定)
#------------------------------------------------------------------------------
#------------------------------------------------------------------------------
# 策略组: default (router 端口 5520 绑定)
# 三个供应商: mini27, dbittai, mimo
# longcontext: weighted (mimo 为主)
# 其他: priority 模式，优先级 mini27 → dbittai → mimo
#------------------------------------------------------------------------------
[virtualrouter.routingPolicyGroups."default"]

[[virtualrouter.routingPolicyGroups."default".routing.default]]
id = "default-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.coding]]
id = "coding-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.thinking]]
id = "thinking-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.longcontext]]
id = "longcontext-weighted-mimo"
priority = 200
mode = "weighted"
targets = ["mimo.mimo-v2.5-pro", "mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7"]
[virtualrouter.routingPolicyGroups."default".routing.longcontext.loadBalancing]
strategy = "weighted"
[virtualrouter.routingPolicyGroups."default".routing.longcontext.loadBalancing.weights]
"mimo.mimo-v2.5-pro" = 5
"mini27.MiniMax-M2.7" = 3
"dbittai.MiniMax-M2.7" = 2

[[virtualrouter.routingPolicyGroups."default".routing.tools]]
id = "tools-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.search]]
id = "search-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.web_search]]
id = "web_search-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.multimodal]]
id = "multimodal-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.video]]
id = "video-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.vision]]
id = "vision-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[[virtualrouter.routingPolicyGroups."default".routing.local]]
id = "local-priority-mini27"
priority = 200
mode = "priority"
targets = ["mini27.MiniMax-M2.7", "dbittai.MiniMax-M2.7", "mimo.mimo-v2.5-pro"]

[virtualrouter.routingPolicyGroups."default".loadBalancing]
strategy = "round-robin"

[virtualrouter.routingPolicyGroups."default".session]
enabled = true
tickMs = 1500
dueWindowMs = 0
retentionMs = 1200000
holdNonStreaming = true
holdMaxMs = 60000

